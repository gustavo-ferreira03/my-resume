name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "resumes/*.yml"
      - "templates/*.typ"
      - "lib/**"
      - "Makefile"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        shell: bash
        run: make setup

      - name: Build PDFs
        shell: bash
        run: make build

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: build/*.pdf

      - name: Publish Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${{ github.run_number }}"
          gh release create "$tag" build/*.pdf \
            --title "Resumes" \
            --notes "Built from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
